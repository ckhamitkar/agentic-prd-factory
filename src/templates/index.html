<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic PRD Factory</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
            max-width: 960px;
            margin: 0 auto;
        }
        h1 { font-size: 1.4rem; margin-bottom: 4px; }
        h2 { font-size: 1.1rem; margin: 20px 0 8px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
        .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 16px; }

        /* Form */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.85rem; }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        textarea { height: 180px; resize: vertical; }
        .row { display: flex; gap: 12px; }
        .row > .form-group { flex: 1; }
        .checkbox-group { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .checkbox-group input { width: auto; }

        button {
            background: #1a365d;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
        }
        button:hover { background: #2c5282; }
        button:disabled { background: #999; cursor: not-allowed; }

        /* Log output */
        #log-section { display: none; }
        #log {
            background: #1a202c;
            color: #a0e6a0;
            padding: 12px;
            border-radius: 4px;
            font-family: "Courier New", monospace;
            font-size: 0.8rem;
            height: 240px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        #status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }
        .badge-running { background: #fefcbf; color: #975a16; }
        .badge-done { background: #c6f6d5; color: #276749; }
        .badge-error { background: #fed7d7; color: #9b2c2c; }

        /* Results */
        #results-section { display: none; }
        .result-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .result-card a { color: #2c5282; text-decoration: none; }
        .result-card a:hover { text-decoration: underline; }
        .score-big { font-size: 1.6rem; font-weight: 700; color: #2c5282; }
        .score-row { display: flex; gap: 20px; margin-top: 6px; font-size: 0.85rem; }

        /* Portfolio table */
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { border: 1px solid #e2e8f0; padding: 6px 10px; text-align: left; }
        th { background: #edf2f7; font-weight: 600; }
        tr:nth-child(even) { background: #f7fafc; }
        .empty-msg { color: #888; font-style: italic; padding: 12px 0; }

        /* Past projects */
        .project-list { list-style: none; }
        .project-list li { padding: 4px 0; }
        .project-list a { color: #2c5282; text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>
    <h1>Agentic PRD Factory</h1>
    <p class="subtitle">Paste an opportunity, run the pipeline, review results.</p>

    <!-- Submit Form -->
    <form id="run-form">
        <div class="form-group">
            <label for="opportunity">Opportunity / Idea</label>
            <textarea id="opportunity" placeholder="Paste your business opportunity or idea here..."></textarea>
        </div>
        <div class="row">
            <div class="form-group">
                <label for="project-name">Project Name</label>
                <input type="text" id="project-name" placeholder="e.g. MyNewApp">
            </div>
            <div class="form-group">
                <label for="mode">Mode</label>
                <select id="mode">
                    <option value="prd_only">PRD Only (Rounds 1-4)</option>
                    <option value="prd_ceo">PRD + CEO Approval (Rounds 1-5)</option>
                    <option value="full_dev">Full Dev Lifecycle</option>
                </select>
            </div>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="skip-ceo">
            <label for="skip-ceo" style="font-weight:normal;">Auto-approve CEO (testing)</label>
        </div>
        <br>
        <button type="submit" id="run-btn">Run Pipeline</button>
    </form>

    <!-- Log Output -->
    <div id="log-section">
        <h2>Progress <span id="status-badge"></span></h2>
        <div id="log"></div>
    </div>

    <!-- Results -->
    <div id="results-section">
        <h2>Results</h2>
        <div id="results-content"></div>
    </div>

    <!-- Portfolio -->
    <h2>Portfolio View</h2>
    <div id="portfolio-content">
        <p class="empty-msg">Loading...</p>
    </div>

    <!-- Past Projects -->
    <h2>Past Projects</h2>
    <div id="projects-list">
        <p class="empty-msg">Loading...</p>
    </div>

    <script>
        const form = document.getElementById('run-form');
        const logSection = document.getElementById('log-section');
        const logEl = document.getElementById('log');
        const badge = document.getElementById('status-badge');
        const resultsSection = document.getElementById('results-section');
        const resultsContent = document.getElementById('results-content');
        const runBtn = document.getElementById('run-btn');

        // Load portfolio on page load
        loadPortfolio();
        loadProjects();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const opp = document.getElementById('opportunity').value.trim();
            const name = document.getElementById('project-name').value.trim();
            const mode = document.getElementById('mode').value;
            const skipCeo = document.getElementById('skip-ceo').checked;

            if (!opp) { alert('Please paste an opportunity.'); return; }
            if (!name) { alert('Please enter a project name.'); return; }

            // Reset UI
            logSection.style.display = 'block';
            resultsSection.style.display = 'none';
            logEl.textContent = '';
            badge.textContent = 'RUNNING';
            badge.className = 'badge-running';
            runBtn.disabled = true;
            runBtn.textContent = 'Running...';

            try {
                const resp = await fetch('/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        opportunity: opp,
                        project_name: name,
                        mode: mode,
                        skip_ceo: skipCeo
                    })
                });
                const data = await resp.json();
                if (!data.job_id) {
                    throw new Error(data.error || 'Failed to start job');
                }

                // Stream logs via SSE
                const es = new EventSource('/status/' + data.job_id);
                es.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'log') {
                        logEl.textContent += msg.message + '\n';
                        logEl.scrollTop = logEl.scrollHeight;
                    } else if (msg.type === 'done') {
                        badge.textContent = 'DONE';
                        badge.className = 'badge-done';
                        runBtn.disabled = false;
                        runBtn.textContent = 'Run Pipeline';
                        es.close();
                        showResults(msg.result, name);
                        loadPortfolio();
                        loadProjects();
                    } else if (msg.type === 'error') {
                        badge.textContent = 'ERROR';
                        badge.className = 'badge-error';
                        logEl.textContent += '\nERROR: ' + msg.message;
                        runBtn.disabled = false;
                        runBtn.textContent = 'Run Pipeline';
                        es.close();
                    }
                };
                es.onerror = () => {
                    badge.textContent = 'DISCONNECTED';
                    badge.className = 'badge-error';
                    runBtn.disabled = false;
                    runBtn.textContent = 'Run Pipeline';
                    es.close();
                };
            } catch (err) {
                badge.textContent = 'ERROR';
                badge.className = 'badge-error';
                logEl.textContent += '\n' + err.message;
                runBtn.disabled = false;
                runBtn.textContent = 'Run Pipeline';
            }
        });

        function showResults(result, projectName) {
            resultsSection.style.display = 'block';
            let html = '<div class="result-card">';
            html += '<strong>Project:</strong> ' + projectName + '<br>';
            html += '<strong>Round:</strong> ' + (result.round || 'N/A') + '<br>';

            if (result.priority_score) {
                html += '<br><span class="score-big">' + result.priority_score.toFixed(1) + '/10</span>';
                html += ' <span style="color:#666;">Priority Score</span>';
                const bd = result.score_breakdown || {};
                html += '<div class="score-row">';
                html += '<span>Reach: ' + (bd.reach || '?') + '/10</span>';
                html += '<span>Feasibility: ' + (bd.technical_feasibility || '?') + '/10</span>';
                html += '<span>Viability: ' + (bd.enterprise_buyin || '?') + '/10</span>';
                html += '</div>';
            }

            html += '<br><strong>Output Files:</strong><br>';
            html += '<a href="/files/' + encodeURIComponent(projectName) + '/output/" target="_blank">View output/</a>';
            html += '</div>';
            resultsContent.innerHTML = html;
        }

        async function loadPortfolio() {
            try {
                const resp = await fetch('/portfolio');
                const data = await resp.json();
                if (!data.length) {
                    document.getElementById('portfolio-content').innerHTML =
                        '<p class="empty-msg">No ideas evaluated yet. Run the pipeline to populate.</p>';
                    return;
                }
                // Sort by score desc
                data.sort((a, b) => (b.priority_score || 0) - (a.priority_score || 0));
                let html = '<table><tr><th>#</th><th>Project</th><th>Score</th><th>Reach</th><th>Feasibility</th><th>Viability</th><th>Date</th></tr>';
                data.forEach((entry, i) => {
                    const bd = entry.score_breakdown || {};
                    let dt = entry.date || '';
                    if (dt.includes('T')) dt = dt.split('T')[0];
                    html += '<tr>';
                    html += '<td>' + (i + 1) + '</td>';
                    html += '<td><a href="/files/' + encodeURIComponent(entry.project_name) + '/output/" target="_blank">' + entry.project_name + '</a></td>';
                    html += '<td><strong>' + (entry.priority_score || 0).toFixed(1) + '</strong></td>';
                    html += '<td>' + (bd.reach || '-') + '</td>';
                    html += '<td>' + (bd.technical_feasibility || '-') + '</td>';
                    html += '<td>' + (bd.enterprise_buyin || '-') + '</td>';
                    html += '<td>' + dt + '</td>';
                    html += '</tr>';
                });
                html += '</table>';
                document.getElementById('portfolio-content').innerHTML = html;
            } catch {
                document.getElementById('portfolio-content').innerHTML =
                    '<p class="empty-msg">Could not load portfolio.</p>';
            }
        }

        async function loadProjects() {
            try {
                const resp = await fetch('/projects');
                const data = await resp.json();
                if (!data.length) {
                    document.getElementById('projects-list').innerHTML =
                        '<p class="empty-msg">No projects yet.</p>';
                    return;
                }
                let html = '<ul class="project-list">';
                data.forEach(p => {
                    html += '<li><a href="/files/' + encodeURIComponent(p) + '/output/" target="_blank">' + p + '</a></li>';
                });
                html += '</ul>';
                document.getElementById('projects-list').innerHTML = html;
            } catch {
                document.getElementById('projects-list').innerHTML =
                    '<p class="empty-msg">Could not load projects.</p>';
            }
        }
    </script>
</body>
</html>
